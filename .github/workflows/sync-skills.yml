name: Sync skills from docs-restate

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout docs-restate
        uses: actions/checkout@v4
        with:
          repository: restatedev/docs-restate
          ref: main
          path: .docs-restate
          sparse-checkout: |
            restate-plugin/skills
          sparse-checkout-cone-mode: false

      - name: Sync plugins/restatedev/skills/
        run: |
          DEST=plugins/restatedev/skills
          rm -rf "$DEST"
          mkdir -p "$DEST"
          if [ -d ".docs-restate/restate-plugin/skills" ]; then
            cp -R .docs-restate/restate-plugin/skills/. "$DEST/"
          else
            echo "Source directory restate-plugin/skills not found in docs-restate@main" >&2
            exit 1
          fi
          rm -rf .docs-restate

      - name: Bump plugin versions if skills changed
        run: |
          SKILLS_DIR=plugins/restatedev/skills
          if git diff --quiet -- "$SKILLS_DIR"; then
            echo "$SKILLS_DIR unchanged — skipping version bump."
            exit 0
          fi

          for M in \
            plugins/restatedev/.claude-plugin/plugin.json \
            plugins/restatedev/.codex-plugin/plugin.json \
            plugins/restatedev/.cursor-plugin/plugin.json
          do
            CURRENT=$(jq -r '.version' "$M")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            jq --arg v "$NEXT" '.version = $v' "$M" > "$M.tmp"
            mv "$M.tmp" "$M"
            echo "$M: $CURRENT -> $NEXT"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            plugins/restatedev/skills \
            plugins/restatedev/.claude-plugin/plugin.json \
            plugins/restatedev/.codex-plugin/plugin.json \
            plugins/restatedev/.cursor-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          VERSION=$(jq -r '.version' plugins/restatedev/.claude-plugin/plugin.json)
          git commit -m "plugin v${VERSION}: sync skills from restatedev/docs-restate@main"
          git push
