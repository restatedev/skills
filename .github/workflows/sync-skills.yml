name: Sync skills from docs-restate

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout docs-restate
        uses: actions/checkout@v4
        with:
          repository: restatedev/docs-restate
          ref: main
          path: .docs-restate
          sparse-checkout: |
            restate-plugin/skills
          sparse-checkout-cone-mode: false

      - name: Sync skills/
        run: |
          rm -rf skills
          mkdir -p skills
          if [ -d ".docs-restate/restate-plugin/skills" ]; then
            cp -R .docs-restate/restate-plugin/skills/. skills/
          else
            echo "Source directory restate-plugin/skills not found in docs-restate@main" >&2
            exit 1
          fi
          rm -rf .docs-restate

      - name: Mirror skills/ to plugins/restatedev/skills/
        run: |
          rm -rf plugins/restatedev/skills
          mkdir -p plugins/restatedev/skills
          cp -R skills/. plugins/restatedev/skills/

      - name: Bump plugin version if skills changed
        run: |
          if git diff --quiet -- skills; then
            echo "skills/ unchanged — skipping version bump."
            exit 0
          fi

          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          for PLUGIN_JSON in .claude-plugin/plugin.json .codex-plugin/plugin.json; do
            jq --arg v "$NEXT" '.version = $v' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
            mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"
          done
          echo "Bumped $CURRENT -> $NEXT"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills plugins/restatedev/skills .claude-plugin/plugin.json .codex-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          git commit -m "plugin v${VERSION}: sync skills from restatedev/docs-restate@main"
          git push
